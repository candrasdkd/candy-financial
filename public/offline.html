<!doctype html>
<html lang="id">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Offline</title>
    <style>
        body {
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, 'Helvetica Neue', Arial;
            margin: 0;
            display: grid;
            place-items: center;
            min-height: 100vh;
            background: #f7f7f7;
            color: #222
        }

        .card {
            max-width: 520px;
            padding: 24px;
            border-radius: 16px;
            background: #fff;
            box-shadow: 0 6px 24px rgba(0, 0, 0, .08);
            text-align: center
        }

        h1 {
            margin: 0 0 8px;
            font-size: 22px
        }

        p {
            margin: 0;
            color: #555
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Kamu sedang offline</h1>
        <p>Beberapa data mungkin belum tersedia. Coba lagi saat koneksi kembali.</p>
    </div>
</body>

</html>
