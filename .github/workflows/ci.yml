name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Enable Corepack (Yarn)
      run: corepack enable

    - name: Install Dependencies
      run: yarn install --immutable

    - name: Run Unit Tests
      run: yarn test

    - name: Build Application
      run: yarn build
